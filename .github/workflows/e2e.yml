name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: wallpaperdb
      CURSOR_SECRET: ${{ secrets.CURSOR_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_DOMAIN: ${{ secrets.CLERK_DOMAIN }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      E2E_BASE_TEST_EMAIL: ${{ secrets.E2E_BASE_TEST_EMAIL }}
      E2E_BASE_TEST_PASSWORD: ${{ secrets.E2E_BASE_TEST_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install turbo
        run: pnpm add -g turbo

      - name: Build
        run: turbo run build

      - name: Install Playwright browsers
        run: pnpm --filter @wallpaperdb/web-e2e exec playwright install --with-deps chromium

      - name: Start infrastructure
        run: make infra-start

      - name: Start application stack for browser E2E
        run: make apps-start

      - name: Run E2E tests
        run: make test-e2e

      - name: Capture browser E2E service diagnostics
        if: failure()
        run: |
          mkdir -p artifacts/web-e2e
          docker compose -p "$COMPOSE_PROJECT_NAME" -f infra/docker-compose.yml logs --no-color > artifacts/web-e2e/infra.log
          docker compose -p "$COMPOSE_PROJECT_NAME" -f infra/docker-compose.apps.yml logs --no-color > artifacts/web-e2e/apps.log

      - name: Upload browser E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-failure-artifacts
          if-no-files-found: ignore
          path: |
            apps/web-e2e/playwright-report
            apps/web-e2e/test-results
            artifacts/web-e2e

      - name: Verify E2E test isolation
        run: make ingestor-e2e-verify

      - name: Stop application stack
        if: always()
        run: make apps-stop

      - name: Stop infrastructure
        if: always()
        run: make infra-stop
