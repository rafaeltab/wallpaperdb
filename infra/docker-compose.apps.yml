# WallpaperDB application services
#
# Requires the infra network to exist first — run `make infra-start` before using this file.
#
# Each service:
#   - Builds from its Dockerfile.dev with the repo root as the build context
#   - Reads runtime config from its app-level .env file (generated by scripts/setup-worktree.mjs)
#   - Uses docker compose watch to sync source changes without rebuilding
#
# Caddy provides a single ingress port (INGRESS_PORT) with path-prefix routing.
# See infra/caddy/Caddyfile for the full routing table.

services:
  ingestor:
    build:
      context: ..
      dockerfile: apps/ingestor/Dockerfile.dev
    environment:
      RUN_DB_MIGRATE: "true"
    env_file:
      - path: ../apps/ingestor/.env
        required: false
    develop:
      watch:
        - action: sync
          path: ../apps/ingestor/src
          target: /app/apps/ingestor/src
        - action: sync+restart
          path: ../packages
          target: /app/packages
        - action: sync
          path: ../apps/ingestor/package.json
          target: /app/apps/ingestor/package.json
        - action: rebuild
          path: ../pnpm-lock.yaml

  media:
    build:
      context: ..
      dockerfile: apps/media/Dockerfile.dev
    environment:
      RUN_DB_MIGRATE: "true"
    env_file:
      - path: ../apps/media/.env
        required: false
    develop:
      watch:
        - action: sync
          path: ../apps/media/src
          target: /app/apps/media/src
        - action: sync+restart
          path: ../packages
          target: /app/packages
        - action: sync
          path: ../apps/media/package.json
          target: /app/apps/media/package.json
        - action: rebuild
          path: ../pnpm-lock.yaml

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile.dev
    env_file:
      - path: ../apps/gateway/.env
        required: false
    develop:
      watch:
        - action: sync
          path: ../apps/gateway/src
          target: /app/apps/gateway/src
        - action: sync+restart
          path: ../packages
          target: /app/packages
        - action: sync
          path: ../apps/gateway/package.json
          target: /app/apps/gateway/package.json
        - action: rebuild
          path: ../pnpm-lock.yaml

  variant-generator:
    build:
      context: ..
      dockerfile: apps/variant-generator/Dockerfile.dev
    env_file:
      - path: ../apps/variant-generator/.env
        required: false
    develop:
      watch:
        - action: sync
          path: ../apps/variant-generator/src
          target: /app/apps/variant-generator/src
        - action: sync+restart
          path: ../packages
          target: /app/packages
        - action: sync
          path: ../apps/variant-generator/package.json
          target: /app/apps/variant-generator/package.json
        - action: rebuild
          path: ../pnpm-lock.yaml

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.dev
    env_file:
      - path: ../apps/web/.env
        required: false
    develop:
      watch:
        - action: sync
          path: ../apps/web/src
          target: /app/apps/web/src
        - action: sync+restart
          path: ../packages
          target: /app/packages
        - action: sync
          path: ../apps/web/package.json
          target: /app/apps/web/package.json
        - action: rebuild
          path: ../pnpm-lock.yaml

  # ---------------------------------------------------------------------------
  # Caddy ingress
  # Exposes a single host port (INGRESS_PORT) and routes to all app services
  # and infrastructure admin UIs via path prefixes.
  # See infra/caddy/Caddyfile for the full routing table.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    ports:
      - "${INGRESS_PORT:-8000}:${INGRESS_PORT:-8000}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - INGRESS_PORT=${INGRESS_PORT:-8000}
    depends_on:
      - ingestor
      - media
      - gateway
      - variant-generator
      - web

networks:
  default:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-wallpaperdb}_network
